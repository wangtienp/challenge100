<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Slider</title>
  </head>
  <link rel="stylesheet" href="style.css" />
  <body>
    <div class="container">
      <div class="slider">
        <div class="content">
          <div class="color red">RED</div>
          <div class="color yellow">YELLOW</div>
          <div class="color blue">BLUE</div>
          <div class="color pink">PINK</div>
          <div class="color purple">PURPLE</div>
        </div>
        <div class="arrows">
            <div class="btn" id="left">&lt;</div>
            <div class="btn" id="right">&gt;</div>
        </div>
        <div class="content-dot">
          <div class="dot red selected"></div>
          <div class="dot yellow"></div>
          <div class="dot blue"></div>
          <div class="dot pink"></div>
          <div class="dot purple"></div>
        </div>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
