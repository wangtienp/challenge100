<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="score-container">
            <div class="my score">0</div>
            <!-- <h1 class="score-text">Score</h1> -->
            <div class="pc score">0</div>
            <div class="pc score">0</div>
        </div>    
        <div class="choices">
            <img src="images/rock.png" alt="rock" data-session="rock">
            <img src="images/paper.png" alt="paper" data-session="paper">
            <img src="images/scissor.png" alt="scissor" data-session="scissor">
        </div>
        <div class="result">
            <div class="pick my">Your choice: <span class="choice"></span> </div>
            <div class="pick pc">PC 1 choice: <span class="choice"></span> </div>
            <div class="pick pc">PC 2 choice: <span class="choice"></span> </div>
            <div class="display"></div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
