<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="container">
        <h1 class="title">Counter</h1>
        <div class="counter">
            <div class="conter-text">
                <h2 class="default">0</h2>
            </div>
            <div class="counter-btns">
                <div id="minus" class="btn">-</div>
                <div id="plus" class="btn">+</div>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
