<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Facts Typing game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="timer">
            <h3>1 Minute typing test</h3>
            <div class="time">1:00</div>
        </div>
        <div class="progress-bar">
            <div class="fill"></div>
        </div>
    </header>
    <div class="container">
        <div class="display">
            <div class="spinner"></div>
        </div>
        <div class="idle-board">
            Timer is paused, resume by typing.
        </div>
    </div>
    <script src="main.js"></script>
</body>

</html>
