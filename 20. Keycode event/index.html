<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript KeyCode</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="title">Javascript Keycode</h1>
    <div class="container">
        <div class="default">Press Any key to get the Keycode Infomation</div>
        <input type="text" placeholder="Type key you want" id="input">
        <div class="hero">
          <div class="info">
            <div class="title"><a href="https://developer.mozilla.org/en-US/docs/Web/API/KeyboardEvent/key" target="_blank">e.key</a></div>
            <div class="key"></div>
          </div>
          <div class="info">
            <div class="title"><a href="https://developer.mozilla.org/en-US/docs/Web/API/KeyboardEvent/code" target="_blank">e.code</a></div>
            <div class="key"></div>
          </div>
          <div class="info deprecated">
            <div class="title deprecated"><a href="https://developer.mozilla.org/en-US/docs/Web/API/KeyboardEvent/keyCode" target="_blank">e.keyCode</a></div>
            <div class="key"></div>
          </div>
          <div class="info deprecated">
            <div class="title deprecated"><a href="https://developer.mozilla.org/en-US/docs/Web/API/UIEvent/which" target="_blank">e.which</a></div>
            <div class="key"></div>
          </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
