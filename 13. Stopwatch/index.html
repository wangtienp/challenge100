<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="stopwatch-display">
            <h1 class="time"><span class="hour">00</span>:<span class="min">00</span>:<span class="sec">00</span></h1>
            <p class="millisec">.000</p>
        </div>
        <div class="buttons">
            <button class="playpause"><i class="fa-solid fa-play"></i> <i class="fa-solid fa-pause"></i></button>
            <button class="reset"> <i class="fa-solid fa-rotate-left"></i> </button>
        </div>
    </div>
    <script src="main.js"></script>
</body>

</html>
