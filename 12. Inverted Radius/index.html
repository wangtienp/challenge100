<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inverted Radius</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <svg width="0" height="0">
        <defs>
            <clipPath id="responsiveClip" clipPathUnits="objectBoundingBox">
                <!-- Coordinates converted to 0.0 - 1.0 range -->
                <path d="M 0,0.04 A 0.04,0.04 0,0,1 0.04,0 L 0.96,0 A 0.04,0.04 0,0,1 1,0.04 L 1,0.96 A 0.04,0.04 0,0,1 0.96,1 L 0.04,1 A 0.04,0.04 0,0,1, 0,0.96 L 0,0.04 Z" />
            </clipPath>
        </defs>
    </svg>
    <div class="shape">
        <div class="border-square"></div>
        <div class="circle"></div>
    </div>
    <script src="main.js"></script>
</body>

</html>
