<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="body">
            <div class="main-display">
                <div class="main-input">
                    <input type="text" placeholder="00:00:00" class="timeInput" value="5:00">
                </div>
                <div class="selection">
                    <button class="plustime" aria-valuetext="000030">+00:30</button>
                    <button class="plustime" aria-valuetext="000100">+01:00</button>
                    <button class="plustime" aria-valuetext="000500">+05:00</button>
                </div>
            </div>
        </div>
        <div class="buttons">
            <button class="playpause to-play">
                <span class="material-icons play">
                    play_arrow
                </span>
                <span class="material-icons pause">
                    pause
                </span>
            </button>
            <button class="reset">
                <span class="material-icons">
                    replay
                </span>
            </button>
        </div>

    </div>
    <script src="main.js"></script>
</body>

</html>
