<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="body">
            <circle></circle>
            <input type="text" placeholder="00:00:00" class="timeInput">
            <div class="selection">
                <button class="plustime">+00:30</button>
                <button class="plustime">+01:00</button>
                <button class="plustime">+05:00</button>
            </div>
        </div>
        <div class="buttons">
            <button class="playpause">
                <span class="material-icons">
                    play_arrow
                </span>
                <span class="material-icons">
                    pause
                </span>
            </button>
            <button class="reset">
                <span class="material-icons">
                    replay
                </span>
            </button>
        </div>

    </div>
    <script src="main.js"></script>
</body>

</html>
